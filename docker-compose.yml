services:
  db:
    image: postgres:16-alpine
    container_name: postgres-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password123
      - POSTGRES_DB=SecureAuthDb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: secure-auth-api
    ports:
      - "8080:8080" # Maps your Kali port 5200 to container 8080
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Database=SecureAuthDb;Username=postgres;Password=password123
      - Jwt__Key=YourSuperSecretLongKeyAtLeast32Chars!!
      - Jwt__Issuer=SecureAuthApi
      - Jwt__Audience=SecureAuthApi
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: